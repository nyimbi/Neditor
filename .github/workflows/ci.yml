name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    name: Desktop build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-22.04
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.2 --activate

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Rust formatting
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Check Rust backend
        run: cargo check --locked
        working-directory: src-tauri

      - name: Check native file watcher feature
        run: cargo check --locked --features native-watch
        working-directory: src-tauri

      - name: Run Rust static analysis
        run: cargo clippy --locked --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Test Rust backend
        run: cargo test --locked
        working-directory: src-tauri

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri desktop shell
        run: ./node_modules/.bin/tauri build --no-bundle

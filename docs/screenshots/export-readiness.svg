<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">NEditor export readiness screenshot</title>
  <desc id="desc">Export target controls, readiness diagnostics, and a manifest preview.</desc>
  <rect width="1280" height="760" fill="#f1f5f9"/>
  <rect x="32" y="28" width="1216" height="704" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="32" y="28" width="1216" height="54" rx="18" fill="#111827"/>
  <text x="64" y="61" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#f9fafb">NEditor Export</text>
  <rect x="50" y="104" width="330" height="586" rx="12" fill="#f8fafc" stroke="#d7dee8"/>
  <text x="76" y="140" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#111827">Export settings</text>
  <text x="76" y="176" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#475569">Target</text>
  <rect x="76" y="190" width="250" height="38" rx="8" fill="#ffffff" stroke="#94a3b8"/>
  <text x="96" y="214" font-family="Inter, Arial, sans-serif" font-size="14" fill="#111827">PDF</text>
  <text x="76" y="266" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#475569">Options</text>
  <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">
    <rect x="76" y="286" width="16" height="16" rx="3" fill="#2563eb"/><text x="104" y="299">Manifest next to export</text>
    <rect x="76" y="322" width="16" height="16" rx="3" fill="#2563eb"/><text x="104" y="335">Cover page</text>
    <rect x="76" y="358" width="16" height="16" rx="3" fill="#2563eb"/><text x="104" y="371">Page numbers</text>
    <rect x="76" y="394" width="16" height="16" rx="3" fill="#2563eb"/><text x="104" y="407">Comments appendix</text>
    <rect x="76" y="430" width="16" height="16" rx="3" fill="#2563eb"/><text x="104" y="443">AI provenance appendix</text>
    <rect x="76" y="466" width="16" height="16" rx="3" fill="#2563eb"/><text x="104" y="479">Glossary appendix</text>
  </g>
  <rect x="76" y="536" width="250" height="42" rx="8" fill="#2563eb"/>
  <text x="140" y="563" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">Prepare for export</text>
  <rect x="76" y="592" width="250" height="42" rx="8" fill="#111827"/>
  <text x="152" y="619" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">Export document</text>
  <rect x="408" y="104" width="380" height="586" rx="12" fill="#ffffff" stroke="#d7dee8"/>
  <text x="438" y="144" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#111827">Readiness report</text>
  <rect x="438" y="174" width="286" height="72" rx="12" fill="#ecfdf5" stroke="#22c55e"/>
  <text x="462" y="207" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#166534">Ready</text>
  <text x="462" y="230" font-family="Inter, Arial, sans-serif" font-size="13" fill="#166534">0 errors, 1 warning, 2 info</text>
  <rect x="438" y="284" width="302" height="72" rx="10" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="462" y="314" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#92400e">warning</text>
  <text x="462" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#92400e">Dirty Git tree warning before export.</text>
  <rect x="438" y="374" width="302" height="72" rx="10" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="462" y="404" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#1d4ed8">info</text>
  <text x="462" y="426" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1d4ed8">Manifest will be written beside output.</text>
  <text x="438" y="508" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#111827">Layout summary</text>
  <rect x="438" y="532" width="64" height="64" rx="12" fill="#dbeafe"/><text x="461" y="570" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#1d4ed8">5</text>
  <text x="518" y="556" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">layout sections</text>
  <text x="518" y="578" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155">2 columned sections</text>
  <rect x="818" y="104" width="410" height="586" rx="12" fill="#0f172a" stroke="#1e293b"/>
  <text x="848" y="144" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#f8fafc">Export manifest</text>
  <text x="848" y="190" font-family="Menlo, Consolas, monospace" font-size="13" fill="#93c5fd">{</text>
  <text x="872" y="220" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">"document_title": "Market Entry Report",</text>
  <text x="872" y="250" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">"export_target": "pdf",</text>
  <text x="872" y="280" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">"status": "in-review",</text>
  <text x="872" y="310" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">"source_hash": "sha256:...",</text>
  <text x="872" y="340" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">"included_files": [</text>
  <text x="896" y="370" font-family="Menlo, Consolas, monospace" font-size="13" fill="#86efac">"chapters/risk.md"</text>
  <text x="872" y="400" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">],</text>
  <text x="872" y="430" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">"diagnostics": [],</text>
  <text x="872" y="460" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">"output_hash": "sha256:..."</text>
  <text x="848" y="490" font-family="Menlo, Consolas, monospace" font-size="13" fill="#93c5fd">}</text>
</svg>

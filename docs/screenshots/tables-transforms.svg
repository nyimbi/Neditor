  <text x="344" y="217" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff">Margin</text>
  <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">
    <rect x="92" y="234" width="330" height="44" fill="#f8fafc" stroke="#e2e8f0"/><text x="114" y="262">East</text><text x="250" y="262">$120k</text><text x="354" y="262">31%</text>
    <rect x="92" y="278" width="330" height="44" fill="#ffffff" stroke="#e2e8f0"/><text x="114" y="306">West</text><text x="250" y="306">$98k</text><text x="354" y="306">24%</text>
    <rect x="92" y="322" width="330" height="44" fill="#f8fafc" stroke="#e2e8f0"/><text x="114" y="350">North</text><text x="250" y="350">$132k</text><text x="354" y="350">34%</text>
    <rect x="92" y="366" width="330" height="44" fill="#fff7ed" stroke="#fdba74"/><text x="114" y="394">Total</text><text x="250" y="394">$350k</text><text x="354" y="394">=AVG</text>
  </g>
  <rect x="92" y="450" width="92" height="34" rx="8" fill="#2563eb"/><text x="116" y="472" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#fff">Sort</text>
  <rect x="198" y="450" width="112" height="34" rx="8" fill="#111827"/><text x="220" y="472" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#fff">Formula</text>
  <rect x="324" y="450" width="98" height="34" rx="8" fill="#16a34a"/><text x="348" y="472" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#fff">Apply</text>
  <rect x="516" y="110" width="322" height="560" rx="14" fill="#0f172a" stroke="#1e293b"/>
  <text x="546" y="150" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#f8fafc">Transform source</text>
  <text x="546" y="204" font-family="Menlo, Consolas, monospace" font-size="13" fill="#86efac">```chart</text>
  <text x="546" y="234" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">type: bar</text>
  <text x="546" y="264" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">title: Revenue by region</text>
  <text x="546" y="294" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">x: [East, West, North]</text>
  <text x="546" y="324" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">y: [120, 98, 132]</text>
  <text x="546" y="354" font-family="Menlo, Consolas, monospace" font-size="13" fill="#86efac">```</text>
  <rect x="546" y="426" width="232" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="568" y="456" font-family="Menlo, Consolas, monospace" font-size="13" fill="#86efac">```calc</text>
  <text x="568" y="486" font-family="Menlo, Consolas, monospace" font-size="13" fill="#bfdbfe">margin = profit / revenue</text>
  <text x="568" y="516" font-family="Menlo, Consolas, monospace" font-size="13" fill="#86efac">```</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">NEditor tables and transforms screenshot</title>
  <desc id="desc">A table editor, formula controls, transform blocks, and preview-safe chart output.</desc>
  <rect width="1280" height="760" fill="#eef2f7"/>
  <rect x="32" y="28" width="1216" height="704" rx="18" fill="#ffffff" stroke="#cbd5e1"/>

  <text x="64" y="61" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#f9fafb">NEditor Tables and Transforms</text>
  <rect x="62" y="110" width="410" height="560" rx="14" fill="#ffffff" stroke="#d7dee8"/>
  <text x="92" y="150" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#111827">Business table editor</text>
